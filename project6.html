<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail | Ridwan Amore</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .project-header {
            max-width: 900px;
            margin: 120px auto 50px auto;
            padding: 0 40px;
        }

        .project-header h2 {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 36px;
            font-weight: 300; /* Clean semi-thick weight */
            letter-spacing: -0.5px;
            margin-bottom: 18px;
            color: #111111;
        }

        .project-header p {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 15px;
            color: #666666;
            max-width: 720px;
            line-height: 1.7;
        }

        /* Core Gallery Layout */
        .project-gallery {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .gallery-block {
            margin-bottom: 70px;
        }

        .gallery-block img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            cursor: zoom-in;
            transition: opacity 0.25s ease;
        }

        .gallery-block img:hover {
            opacity: 0.92;
        }

        .gallery-block .caption {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin-top: 16px;
            font-size: 14px;
            color: #666666;
            line-height: 1.6;
        }

        /* Recommendation Banner */
        .recommendation-footer {
            border-top: 1px solid #f0f0f0;
            padding: 70px 40px;
            text-align: center;
            background-color: #fafafa;
            margin-top: 120px;
        }

        .recommendation-footer span {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #999999;
            display: block;
            margin-bottom: 12px;
            font-weight: 400;
        }

        .recommendation-footer a {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 24px;
            font-weight: 300; /* Clean semi-thick style */
            color: #111111;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s ease;
        }

        .recommendation-footer a:hover {
            opacity: 0.5;
        }

        /* Essential Lightbox / Image Zoom Layout */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 92%;
            max-height: 92%;
            object-fit: contain;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .lightbox.active img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #ffffff;
            font-size: 40px;
            cursor: pointer;
            font-weight: 200;
        }
    </style>
</head>
<body>

    <!-- Constant Navigation Bar -->
    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html#projects">Projects</a>
            <a href="work.html">Work</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-right">
            <span class="signature">Ridwan Amore</span>
            <div class="social-icons">
                <a href="contact.html">✉</a>
            </div>
        </div>
    </nav>

    <main>
        <!-- Project Context Head -->
        <header class="project-header">
            <h2>Depop New Feature Design</h2>
            <p>Group work that introduces a new feature to Depop, I designed the visuals of the new feature.</p>
        </header>

        <!-- Vertical Content Flow -->
        <section class="project-gallery">
            
            <div class="gallery-block">
                <img src="1.png" alt="Project Documentation 1" class="zoomable">
            </div>

            <div class="gallery-block">
                <img src="2.png" alt="Project Documentation 2" class="zoomable">
            </div>

            <div class="gallery-block">
                <img src="3.png" alt="Project Documentation 3" class="zoomable">
            </div>

            <div class="gallery-block">
                <img src="4.png" alt="Project Documentation 4" class="zoomable">
            </div>

            <div class="gallery-block">
                <img src="5.png" alt="Project Documentation 5" class="zoomable">
            </div>

            <div class="gallery-block">
                <img src="6.png" alt="Project Documentation 6" class="zoomable">
            </div>

            <div class="gallery-block">
                <img src="7.png" alt="Project Documentation 7" class="zoomable">
            </div>

                       <!-- 🎬 Direct Native Video Player Integration -->
            <div class="gallery-block">
                <div style="width: 100%; max-width: 900px; margin: 0 auto; background: #fafafa; border-radius: 4px; overflow: hidden;">
                    <!-- Added essential explicit browser streaming parameters -->
                    <video controls preload="metadata" playsinline width="100%" style="display: block; width: 100%; height: auto;">
                        <source src="Depop_SqudGame_2.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div class="caption" style="margin-top: 16px;">
                    Depop feature visualization and interactive flow demonstration.
                </div>
            </div>



        </section>

        <!-- "You May Also Like" Recommendation Segment -->
        <footer class="recommendation-footer">
            <span>You May Also Like</span>
            <a href="project1.html">Design & Art Festival Takeover &rarr;</a>
        </footer>
    </main>

    <!-- Lightbox Element for Instant Image Zooming -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Enlarged view">
    </div>

    <!-- Lightbox Zoom Execution Script -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.getElementById('lightbox-close');

        document.querySelectorAll('.zoomable').forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
            });
        });

        lightboxClose.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target !== lightboxImg && e.target !== lightboxClose) {
                lightbox.classList.remove('active');
            }
        });
    </script>
</body>
</html>
